name: Jobs Scraper

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

jobs:
  scrape:
    name: Run jobs scraper
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: Jobs_Scraper/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r Jobs_Scraper/requirements.txt
          python -m pip install playwright

      - name: Verify Playwright install
        run: python -m pip show playwright

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      - name: Run scraper pipeline
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          MONGODB_DB_NAME: ${{ secrets.MONGODB_DB_NAME }}
          MONGODB_COLLECTION_NAME: ${{ secrets.MONGODB_COLLECTION_NAME }}
        run: python Jobs_Scraper/all.py --scope all
